name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust_target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-latest'
            args: '--target x86_64-unknown-linux-gnu'
            rust_target: 'x86_64-unknown-linux-gnu'
          - platform: 'ubuntu-latest'
            args: '--target aarch64-unknown-linux-gnu'
            rust_target: 'aarch64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
            rust_target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Bun cache
        uses: actions/setup-node@v4
        with:
          cache: 'bun'
          cache-dependency-path: bun.lock

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Download platform-specific binary
        run: |
          REPO="router-for-me/CLIProxyAPI"
          VERSION=$(curl -sL "https://api.github.com/repos/$REPO/releases/latest" | grep '"tag_name"' | sed -E 's/.*"tag_name": *"([^"]+)".*/\1/')
          VERSION_NUM="${VERSION#v}"
          echo "CLIProxyAPI version: $VERSION"

          mkdir -p tauri/binaries

          TARGET="${{ matrix.rust_target }}"

          # Map target to download parameters
          case "$TARGET" in
            aarch64-apple-darwin)      OS="darwin"; GOARCH="arm64"; EXT="tar.gz"; BIN_SUFFIX="" ;;
            x86_64-apple-darwin)       OS="darwin"; GOARCH="amd64"; EXT="tar.gz"; BIN_SUFFIX="" ;;
            aarch64-unknown-linux-gnu) OS="linux";  GOARCH="arm64"; EXT="tar.gz"; BIN_SUFFIX="" ;;
            x86_64-unknown-linux-gnu)  OS="linux";  GOARCH="amd64"; EXT="tar.gz"; BIN_SUFFIX="" ;;
            x86_64-pc-windows-msvc)    OS="windows"; GOARCH="amd64"; EXT="zip"; BIN_SUFFIX=".exe" ;;
            *) echo "Error: Unknown target $TARGET"; exit 1 ;;
          esac

          ASSET_NAME="CLIProxyAPI_${VERSION_NUM}_${OS}_${GOARCH}.${EXT}"
          DOWNLOAD_URL="https://github.com/$REPO/releases/download/$VERSION/$ASSET_NAME"

          echo "Downloading $DOWNLOAD_URL ..."

          curl -fSL -o "temp.${EXT}" "$DOWNLOAD_URL"
          if [ "$EXT" = "zip" ]; then
            unzip -q "temp.${EXT}" -d "temp_extracted"
          else
            mkdir -p "temp_extracted"
            tar -xzf "temp.${EXT}" -C "temp_extracted"
          fi

          # Find and move binary
          BINARY=$(find temp_extracted \( -name "CLIProxyAPI${BIN_SUFFIX}" -o -name "cli-proxy-api${BIN_SUFFIX}" \) -type f | head -1)
          if [ -z "$BINARY" ]; then
            echo "Error: Binary not found in archive"
            find temp_extracted -type f
            exit 1
          fi

          # Move to the expected path (without target suffix to match tauri.conf.json)
          mv "$BINARY" "tauri/binaries/cli-proxy-api${BIN_SUFFIX}"
          chmod +x "tauri/binaries/cli-proxy-api${BIN_SUFFIX}" || true

          rm -rf "temp.${EXT}" "temp_extracted"
          ls -la tauri/binaries/
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: bun run build
          args: ${{ matrix.args }}
